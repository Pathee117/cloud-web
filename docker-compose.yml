services:
  app:
    build: .
    container_name: cloud-app
    ports:
      - "127.0.0.1:8080:3000"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: cloudapp
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: cloud-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloudapp
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
